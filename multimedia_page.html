<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: lightgray;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: darkblue;
            margin-bottom: 30px;
        }

        h3 {
            color: darkgreen;
            margin-bottom: 10px;
        }

        .section {
            background-color: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            border: 1px solid gray;
        }

        video {
            width: 100%;
            border: 2px solid navy;
            border-radius: 8px;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        img {
            width: 100%;
            border-radius: 8px;
            border: 2px solid green;
        }

        iframe {
            width: 100%;
            height: 300px;
            border: 2px solid red;
            border-radius: 8px;
        }

        p {
            color: black;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>HTML Multimedia Practice</h1>
    
 <div class="section">
    <h3>Audio (Spotify)</h3>
    <p>Embedding Spotify audio </p>

    <iframe 
        style="border-radius:12px" 
        src="https://open.spotify.com/embed/track/0qvoxfYodIfe14gaidhnsV"
        width="100%" 
        height="152" 
        frameborder="0" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
</div>

    <div class="section">
        <h3>Image Tag</h3>
        <p>Display the image</p>
        <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d" alt="Sample Image">
    </div>

   <div class="section">
    <h3>YouTube Embed (iframe)</h3>
    <iframe
        src="https://www.youtube.com/embed/8Vuwv-aEEXQ"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
